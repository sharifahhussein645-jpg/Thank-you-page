<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>𝐅𝐈𝐓𝐒 Thank You</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1a1a, #000);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    /* ===== LOGO ===== */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
    }

    .logo-box {
      background: #f5e6c8; /* cream */
      padding: 10px 18px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    .logo-f {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: black;
      color: #f5e6c8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
    }

    .logo-text {
      font-weight: bold;
      color: black;
      letter-spacing: 1px;
      font-size: 14px;
    }

    h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    p {
      color: #ccc;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .order {
      background: #d4af37;
      color: black;
    }

    .whatsapp {
      background: #25D366;
      color: white;
    }

    .instagram {
      background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
      color: white;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .footer {
      margin-top: 15px;
      font-size: 11px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="card">

    <!-- LOGO -->
    <div class="logo-wrap">
      <div class="logo-box">
        <div class="logo-f">F</div>
        <div class="logo-text">𝐅𝐈𝐓𝐒</div>
      </div>
    </div>

    <h1>Thank You 💛</h1>
    <p>We’re happy to connect with you — explore, chat, or place your order below.</p>

    <!-- ORDER -->
    <a class="btn order" href="https://your-order-link.com" target="_blank">
      Order Now
    </a>

    <!-- WHATSAPP -->
    <a class="btn whatsapp" href="https://wa.me/2349129099763" target="_blank">
      Chat on WhatsApp
    </a>

    <!-- INSTAGRAM -->
    <a class="btn instagram" href="https://instagram.com/_fits.a" target="_blank">
      Follow on Instagram
    </a>
    <!-- TIKTOK -->
    <a class="btn tiktok" href="tiktok.com/@_fits.a" target="_blank"
    >
      Follow on Tiktok 
    </a>

    <div class="footer">
      FITS • We Fit Wherever You Are
    </div>

  </div>

</body>
</html>
